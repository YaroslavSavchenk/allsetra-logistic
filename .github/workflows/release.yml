name: Build signed Windows installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as draft release'
        type: boolean
        default: true

jobs:
  build-windows:
    name: Build and release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Zoho secrets are baked into the Rust binary at compile time via
          # env!() — when set here, the `zoho_is_configured` probe returns
          # true and the frontend switches from MockOrderService to
          # ZohoOrderService. When unset, the app still builds but falls back
          # to mock data (useful for early builds / previews).
          ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          # Optional overrides — leave unset to use built-in defaults
          # (EU sandbox, module "RouteConnectOrders_test").
          ZOHO_API_BASE: ${{ secrets.ZOHO_API_BASE }}
          ZOHO_ACCOUNTS_URL: ${{ secrets.ZOHO_ACCOUNTS_URL }}
          ZOHO_MODULE: ${{ secrets.ZOHO_MODULE }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RouteConnect Logistiek ${{ github.ref_name }}'
          releaseBody: |
            Windows installer voor RouteConnect Logistiek.

            Download het `.msi` of `.exe` bestand hieronder en installeer.
            Auto-update zorgt daarna dat je altijd de laatste versie hebt —
            geen herinstallatie meer nodig.
          releaseDraft: ${{ github.event.inputs.draft != 'false' }}
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --target x86_64-pc-windows-msvc
